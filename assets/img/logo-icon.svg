<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 104 80" width="104" height="80" role="img" aria-label="BiblioTech">
  <title>BiblioTech</title>
  <g transform="translate(52, 42)">

    <!-- Página esquerda — branco sólido -->
    <g transform="rotate(-13, 0, 22)">
      <rect x="-36" y="-33" width="36" height="55" rx="6" fill="white"/>
      <rect x="-30" y="-18" width="22" height="3"  rx="1.5" fill="#22543D" opacity="0.45"/>
      <rect x="-30" y="-8"  width="22" height="3"  rx="1.5" fill="#22543D" opacity="0.45"/>
      <rect x="-30" y="2"   width="14" height="3"  rx="1.5" fill="#22543D" opacity="0.45"/>
    </g>

    <!-- Página direita — branco semitransparente -->
    <g transform="rotate(13, 0, 22)">
      <rect x="0" y="-33" width="36" height="55" rx="6" fill="white" opacity="0.62"/>
      <circle cx="18" cy="-4"  r="4.5" fill="#22543D" opacity="0.35"/>
      <circle cx="8"  cy="-19" r="2.5" fill="#22543D" opacity="0.25"/>
      <circle cx="28" cy="-19" r="2.5" fill="#22543D" opacity="0.25"/>
