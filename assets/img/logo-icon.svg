      <line x1="18" y1="-4" x2="8"  y2="-19" stroke="#22543D" stroke-width="1.5" stroke-linecap="round" opacity="0.20"/>
      <line x1="18" y1="-4" x2="28" y2="-19" stroke="#22543D" stroke-width="1.5" stroke-linecap="round" opacity="0.20"/>
      <line x1="18" y1="-4" x2="18" y2="12"  stroke="#22543D" stroke-width="1.5" stroke-linecap="round" opacity="0.20"/>
    </g>

    <!-- Lombada -->
    <rect x="-5" y="-27" width="10" height="49" rx="5" fill="white" opacity="0.22"/>
